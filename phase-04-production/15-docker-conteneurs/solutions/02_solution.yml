# Module 15 — Solution exercice à trou #2

version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://admin:supersecret@db:5432/game_db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - game-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=supersecret
      - POSTGRES_DB=game_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d game_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - game-network

volumes:
  postgres_data:

networks:
  game-network:
