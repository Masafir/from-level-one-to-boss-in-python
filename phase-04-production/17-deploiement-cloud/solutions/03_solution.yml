# Module 17 — Solution exercice 3

version: '3.8'

services:
  web:
    build: .
    networks:
      - backend

  reverse-proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      # Optionnel mais recommandé: Volume pour garder les certifs SSL
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - backend

volumes:
  caddy_data:
  caddy_config:

networks:
  backend:
