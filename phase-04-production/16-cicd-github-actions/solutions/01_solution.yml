# Module 16 — Solution exercice à trou #1

name: Validation de la PR

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test_and_lint:
    runs-on: ubuntu-latest

    steps:
    - name: Récupérer le code
      uses: actions/checkout@v4

    - name: Installer Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Installer les dépendances
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lancer le Linter (Ruff)
      run: ruff check .

    - name: Lancer le Type Checker (Mypy)
      run: mypy src/ --strict

    - name: Lancer les Tests (Pytest)
      run: pytest -v
